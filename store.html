<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق 360 - مخزن المحتوى والوسائط</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>

        .page-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        .back-button {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-xs);
            background: var(--surface);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text);
            text-decoration: none;
        }
        .back-button:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateX(2px);
        }
        .store-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }
        
        /* New Extracted Styles */
        .store-actions {
            display: flex;
            gap: 12px;
            margin: 24px;
            flex-wrap: wrap;
        }
        
        .store-action-btn {
            padding: 10px 16px;
            border-radius: var(--radius-xs);
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            font-size: 14px;
        }
        
        .store-action-btn.primary {
            background: var(--primary);
            color: white;
            border: none;
        }
        
        .store-action-btn.secondary {
            background: var(--surface);
            color: var(--primary);
            border: 1px solid var(--primary);
        }
        
        .store-action-btn.primary:hover {
            filter: brightness(1.1);
        }
        
        .store-action-btn.secondary:hover {
            background: var(--primary);
            color: white;
        }
		.vault-items-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 16px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: var(--surface);
            padding: 24px;
            border-radius: var(--radius);
            width: 90%;
            max-width: 500px;
            box-shadow: var(--shadow-lg);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
        }

        .modal-form-label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .modal-radio-group {
            display: flex;
            gap: 16px;
            background: var(--bg);
            padding: 10px;
            border-radius: var(--radius-xs);
            border: 1px solid var(--border);
        }

        .modal-radio-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            background: var(--bg);
            padding: 12px;
            border-radius: var(--radius-xs);
            border: 1px solid var(--border);
        }

        .modal-radio-label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        
        .modal-radio-grid .modal-radio-label {
            font-size: 13px;
            font-weight: normal;
        }

        .modal-input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-xs);
            font-family: 'Tajawal', sans-serif;
            font-size: 14px;
            background: var(--bg);
            color: var(--text);
        }

        .modal-input.readonly {
            background: #e2e8f0;
            color: var(--text-muted);
            cursor: not-allowed;
            font-weight: 700;
        }

        .modal-upload-area {
            border: 2px dashed var(--border);
            padding: 30px;
            text-align: center;
            border-radius: var(--radius-sm);
            cursor: pointer;
            background: var(--bg);
            transition: 0.3s;
        }

        .modal-upload-area:hover {
            border-color: var(--primary);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .modal-btn-save {
            flex: 1;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-xs);
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .modal-btn-save:hover {
            filter: brightness(1.1);
        }

        .modal-btn-cancel {
            flex: 1;
            padding: 12px;
            background: var(--bg);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-xs);
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .modal-btn-cancel:hover {
            background: #fee2e2;
            color: #c0392b;
        }

        /* Mobile specific adjustments */
        @media (max-width: 768px) {
            .store-action-btn {
                padding: 6px 10px;
                font-size: 11px;
            }
            .store-action-btn svg {
                width: 16px;
                height: 16px;
            }
            
            .modal-content {
                padding: 16px;
                width: 95%;
                max-height: 85vh;
            }
            .modal-header {
                font-size: 16px;
                margin-bottom: 16px;
            }
            .modal-form-label {
                font-size: 12px;
            }
            .modal-radio-label {
                font-size: 12px;
            }
            .modal-radio-grid {
                grid-template-columns: 1fr;
            }
            .modal-radio-grid .modal-radio-label {
                font-size: 12px;
            }
            .modal-input {
                padding: 8px 12px;
                font-size: 13px;
            }
            .modal-upload-area {
                padding: 20px;
            }
            .modal-btn-save, .modal-btn-cancel {
                padding: 10px;
                font-size: 13px;
            }

            .vault-items-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            .item-name { font-size: 12px; }
            .item-meta-row { font-size: 10px; }
            .item-action-btn svg { width: 14px; height: 14px; }

        }
    
        
        .item-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-xs);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
        }
        .item-card:hover {
            border-color: var(--card-accent);
            box-shadow: var(--shadow-sm);
        }
        .item-preview {
            aspect-ratio: 16/9;
            background: rgba(0,0,0,0.02);
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--border);
        }
        .item-details {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }
        .item-name {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .item-meta-row {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-secondary);
            font-family: monospace;
        }
        .item-schedule {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--primary);
            font-size: 11px;
            margin-top: 2px;
            font-weight: 600;
        }
        .item-actions {
            display: flex;
            border-top: 1px solid var(--border);
            background: var(--surface);
        }
        .item-action-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 0;
            color: var(--text-secondary);
            background: transparent;
            border: none;
            border-left: 1px solid var(--border);
            cursor: pointer;
            transition: 0.2s;
        }
        .item-action-btn:last-child { border-left: none; }
        .item-action-btn:hover { background: var(--bg); color: var(--text); }
        .item-action-btn.danger:hover { color: #c0392b; background: #fee2e2; }

    </style>
</head>
<body>


<div class="app-container">
    <main class="main-content">
        <div class="page-header animate-in">
            <a href="index.html" class="back-button">
                <i data-lucide="arrow-right"></i>
            </a>
            <div class="page-title">
                <h2><i data-lucide="folder-open"></i>مخزن المحتوى والوسائط</h2>
                <p>إدارة كافة ملفات الوسائط، التصاميم، والقوالب</p>
            </div>
        </div>

        
        <div class="store-actions">
            <button class="store-action-btn primary" onclick="openAddItemModal()">
               إضافة عنصر
			    <i data-lucide="plus"></i> 
            </button>
            <button class="store-action-btn secondary" onclick="openAddPostModal()">
                 إضافة منشور متكامل
				 <i data-lucide="file-plus"></i>
            </button>
        </div>

        <div class="store-grid" id="storeGrid"></div>
    </main>
</div>


<!-- Add Item Modal -->
<div id="addItemModal" class="modal-overlay">
    <div class="modal-content">
        <h3 class="modal-header">
            <i data-lucide="plus-circle"></i> إضافة عنصر جديد
        </h3>

        <div class="form-group" style="margin-bottom: 16px;">
            <label class="modal-form-label">نوع العنصر:</label>
            <div class="modal-radio-group">
                <label class="modal-radio-label">
                    <input type="radio" name="itemType" value="media" checked onchange="handleItemTypeChange()">
                    وسائط
                </label>
                <label class="modal-radio-label">
                    <input type="radio" name="itemType" value="template" onchange="handleItemTypeChange()">
                    قالب نصي
                </label>
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 16px;">
            <label class="modal-form-label">إلى المخزن:</label>
            <div class="modal-radio-grid">
                <label class="modal-radio-label">
                    <input type="radio" name="vaultTarget" value="videos" checked> مقاطع الفيديو
                </label>
                <label class="modal-radio-label">
                    <input type="radio" name="vaultTarget" value="graphics"> تصاميم الجرافكس
                </label>
                <label class="modal-radio-label">
                    <input type="radio" name="vaultTarget" value="templates"> قوالب المنشورات
                </label>
                <label class="modal-radio-label">
                    <input type="radio" name="vaultTarget" value="files"> ملفات عامة
                </label>
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 16px;">
            <label class="modal-form-label" style="margin-bottom: 6px;">الرقم التسلسلي</label>
            <input type="text" id="itemSerial" class="modal-input readonly" readonly value="img-1001">
        </div>

        <div id="dynamicAreaMedia" style="margin-bottom: 16px;">
            <label class="modal-form-label" style="margin-bottom: 6px;">رفع الوسائط</label>
            <div class="modal-upload-area" onclick="document.getElementById('fileUpload').click();">
                <i data-lucide="upload-cloud" style="width: 36px; height: 36px; color: var(--text-muted); margin-bottom: 10px;"></i>
                <div style="font-size: 13px; color: var(--text-secondary); font-weight: 600;">اضغط هنا لرفع الملف</div>
                <input type="file" id="fileUpload" style="display: none;" onchange="handleFileUpload(this)">
                <div id="fileNameDisplay" style="margin-top: 10px; font-size: 12px; color: var(--primary); font-weight: 700;"></div>
            </div>
        </div>

        <div id="dynamicAreaTemplate" style="display: none; margin-bottom: 16px;">
            <div class="form-group" style="margin-bottom: 12px;">
                <label class="modal-form-label" style="margin-bottom: 6px;">عنوان المنشور</label>
                <input type="text" id="templateTitle" class="modal-input" placeholder="أدخل عنوان المنشور...">
            </div>
            <div class="form-group">
                <label class="modal-form-label" style="margin-bottom: 6px;">نص المنشور</label>
                <textarea id="templateCaption" class="modal-input" style="min-height: 100px; resize: vertical;" placeholder="اكتب نص المنشور هنا..."></textarea>
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 24px;">
            <label class="modal-form-label" style="margin-bottom: 6px;">جدولة (تاريخ المنشور)</label>
            <input type="date" id="itemSchedule" class="modal-input">
        </div>

        <div class="modal-actions">
            <button onclick="saveNewItem()" class="modal-btn-save">حفظ</button>
            <button onclick="closeAddItemModal()" class="modal-btn-cancel">إلغاء</button>
        </div>
    </div>
</div>


<!-- Add Complete Post Modal -->
<div id="addPostModal" class="modal-overlay">
    <div class="modal-content">
        <h3 class="modal-header">
            <i data-lucide="file-plus"></i> إضافة منشور متكامل
        </h3>

        <div class="form-group" style="margin-bottom: 16px;">
            <label class="modal-form-label" style="margin-bottom: 6px;">عنوان المنشور</label>
            <input type="text" id="completePostTitle" class="modal-input" placeholder="أدخل عنوان المنشور الرئيسي...">
        </div>

        <div class="form-group" style="margin-bottom: 16px;">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 6px;">
                <label class="modal-form-label" style="margin-bottom: 0;">نص المنشور</label>
                <div style="font-size: 11px; color: var(--primary); font-weight: 700; background: var(--bg); padding: 2px 8px; border-radius: 4px; border: 1px solid var(--border);">
                    قالب: <span id="completePostTextSerial">tex-105</span>
                </div>
            </div>
            <textarea id="completePostCaption" class="modal-input" style="min-height: 100px; resize: vertical;" placeholder="اكتب نص المنشور هنا..."></textarea>
        </div>

        <div id="dynamicAreaCompleteMedia" style="margin-bottom: 16px;">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 6px;">
                <label class="modal-form-label" style="margin-bottom: 0;">رفع الوسائط (صورة/فيديو)</label>
                <div style="font-size: 11px; color: var(--primary); font-weight: 700; background: var(--bg); padding: 2px 8px; border-radius: 4px; border: 1px solid var(--border);">
                    وسائط: <span id="completePostMediaSerial">med-000</span>
                </div>
            </div>
            <div class="modal-upload-area" onclick="document.getElementById('completePostFileUpload').click();">
                <i data-lucide="upload-cloud" style="width: 36px; height: 36px; color: var(--text-muted); margin-bottom: 10px;"></i>
                <div style="font-size: 13px; color: var(--text-secondary); font-weight: 600;">اضغط هنا لرفع الصورة أو الفيديو</div>
                <input type="file" id="completePostFileUpload" style="display: none;" onchange="handleCompletePostFileUpload(this)">
                <div id="completePostFileNameDisplay" style="margin-top: 10px; font-size: 12px; color: var(--primary); font-weight: 700;"></div>
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 24px;">
            <label class="modal-form-label" style="margin-bottom: 6px;">جدولة (تاريخ المنشور)</label>
            <input type="date" id="completePostSchedule" class="modal-input">
        </div>

        <div class="modal-actions">
            <button onclick="saveCompletePost()" class="modal-btn-save">حفظ المنشور</button>
            <button onclick="closeAddPostModal()" class="modal-btn-cancel">إلغاء</button>
        </div>
    </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
    const vaultItems = [
        {
            title: 'مقاطع الفيديو',
            icon: 'video',
            accent: '#1e3a5f',
            accentBg: 'rgba(30,58,95,0.08)',
            contents: [
                { name: 'تجريبي_الشحن.mp4', size: '12 MB', icon: 'video', color: '#1e3a5f', bg: 'rgba(30,58,95,0.08)', serial: 'vid-1001', schedule: '2026-05-20', type: 'media' },
                { name: 'حملة_الربع.mp4', size: '24 MB', icon: 'video', color: '#1e3a5f', bg: 'rgba(30,58,95,0.08)', serial: 'vid-1002', schedule: '', type: 'media' },
                { name: 'شحن_ذكي.mp4', size: '18 MB', icon: 'video', color: '#1e3a5f', bg: 'rgba(30,58,95,0.08)', serial: 'vid-1003', schedule: '2026-06-01', type: 'media' }
            ]
        },
        {
            title: 'تصاميم الجرافكس',
            icon: 'palette',
            accent: '#E4405F',
            accentBg: 'rgba(228,64,95,0.08)',
            contents: [
                { name: 'بوست_عيد.jpg', size: '2 MB', icon: 'image', color: '#E4405F', bg: 'rgba(228,64,95,0.08)', serial: 'img-2001', schedule: '2026-05-18', type: 'media' },
                { name: 'بانر_تطبيق.png', size: '4 MB', icon: 'image', color: '#E4405F', bg: 'rgba(228,64,95,0.08)', serial: 'img-2002', schedule: '', type: 'media' },
                { name: 'ستوري_انستا.jpg', size: '1 MB', icon: 'image', color: '#E4405F', bg: 'rgba(228,64,95,0.08)', serial: 'img-2003', schedule: '2026-05-22', type: 'media' }
            ]
        },
        {
            title: 'قوالب المنشورات',
            icon: 'layers',
            accent: '#2d6a4f',
            accentBg: 'rgba(45,106,79,0.08)',
            contents: [
                { name: 'قالب إعلان خصم', size: '85 KB', icon: 'file-text', color: '#2d6a4f', bg: 'rgba(45,106,79,0.08)', serial: 'tex-3001', schedule: '2026-05-25', type: 'template' },
                { name: 'تهنئة العيد', size: '120 KB', icon: 'presentation', color: '#2d6a4f', bg: 'rgba(45,106,79,0.08)', serial: 'tex-3002', schedule: '2026-06-05', type: 'template' }
            ]
        },
        {
            title: 'ملفات عامة',
            icon: 'shapes',
            accent: '#f59e0b',
            accentBg: 'rgba(245,158,11,0.08)',
            contents: [
                { name: 'logo_primary.svg', size: '12 KB', icon: 'square', color: '#f59e0b', bg: 'rgba(245,158,11,0.08)', serial: 'fil-4001', schedule: '', type: 'media' },
                { name: 'brand_guide.pdf', size: '1.2 MB', icon: 'file', color: '#f59e0b', bg: 'rgba(245,158,11,0.08)', serial: 'fil-4002', schedule: '', type: 'media' }
            ]
        }
    ];

    
    let currentCounters = { img: 105, vid: 201, tex: 304 };

    function openAddItemModal() {
        document.getElementById('addItemModal').style.display = 'flex';
        handleItemTypeChange();
    }

    function closeAddItemModal() {
        document.getElementById('addItemModal').style.display = 'none';
        document.getElementById('fileUpload').value = '';
        document.getElementById('fileNameDisplay').textContent = '';
        document.getElementById('templateTitle').value = '';
        document.getElementById('templateCaption').value = '';
        document.getElementById('itemSchedule').value = '';
    }

    function handleItemTypeChange() {
        const type = document.querySelector('input[name="itemType"]:checked').value;
        const mediaArea = document.getElementById('dynamicAreaMedia');
        const templateArea = document.getElementById('dynamicAreaTemplate');
        const serialInput = document.getElementById('itemSerial');
        const fileInput = document.getElementById('fileUpload');

        if (type === 'media') {
            mediaArea.style.display = 'block';
            templateArea.style.display = 'none';
            if (fileInput.files.length > 0) {
                handleFileUpload(fileInput);
            } else {
                serialInput.value = `img-${currentCounters.img + 1}`;
            }
        } else {
            mediaArea.style.display = 'none';
            templateArea.style.display = 'block';
            serialInput.value = `tex-${currentCounters.tex + 1}`;
        }
    }

    function handleFileUpload(input) {
        if (input.files && input.files[0]) {
            const file = input.files[0];
            document.getElementById('fileNameDisplay').textContent = file.name;
            const type = file.type;
            const serialInput = document.getElementById('itemSerial');
            if (type.startsWith('video/')) {
                serialInput.value = `vid-${currentCounters.vid + 1}`;
            } else {
                serialInput.value = `img-${currentCounters.img + 1}`;
            }
        }
    }

    function saveNewItem() {
        showToast('تم حفظ العنصر بنجاح!', 'success');
        closeAddItemModal();
    }

    
    function openAddPostModal() {
        document.getElementById('addPostModal').style.display = 'flex';
        // Generate new serials
        document.getElementById('completePostTextSerial').textContent = `tex-${currentCounters.tex + 1}`;
        document.getElementById('completePostMediaSerial').textContent = `img-${currentCounters.img + 1}`; // default to img
    }

    function closeAddPostModal() {
        document.getElementById('addPostModal').style.display = 'none';
        document.getElementById('completePostTitle').value = '';
        document.getElementById('completePostCaption').value = '';
        document.getElementById('completePostFileUpload').value = '';
        document.getElementById('completePostFileNameDisplay').textContent = '';
        document.getElementById('completePostSchedule').value = '';
    }

    function handleCompletePostFileUpload(input) {
        if (input.files && input.files[0]) {
            const file = input.files[0];
            document.getElementById('completePostFileNameDisplay').textContent = file.name;
            const type = file.type;
            const mediaSerialSpan = document.getElementById('completePostMediaSerial');
            if (type.startsWith('video/')) {
                mediaSerialSpan.textContent = `vid-${currentCounters.vid + 1}`;
            } else {
                mediaSerialSpan.textContent = `img-${currentCounters.img + 1}`;
            }
        }
    }

    function saveCompletePost() {
        const title = document.getElementById('completePostTitle').value;
        const caption = document.getElementById('completePostCaption').value;
        const schedule = document.getElementById('completePostSchedule').value;
        const mediaFile = document.getElementById('completePostFileUpload').files[0];
        
        if(!title || !schedule) {
            showToast('الرجاء إدخال العنوان وتاريخ الجدولة', 'error');
            return;
        }

        const dateObj = new Date(schedule);
        const day = dateObj.getDate();

        const postData = {
            title: title,
            caption: caption,
            mediaSerial: document.getElementById('completePostMediaSerial').textContent,
            textSerial: document.getElementById('completePostTextSerial').textContent,
            day: day
        };

        // Save to localStorage so index.html can read it
        let customPosts = JSON.parse(localStorage.getItem('customPosts') || '{}');
        customPosts[day] = postData;
        localStorage.setItem('customPosts', JSON.stringify(customPosts));

        // Save vault items
        let customVault = JSON.parse(localStorage.getItem('customVault') || '[]');
        if(caption) {
            customVault.push({
                vaultTarget: 'templates',
                name: title,
                size: '1 KB',
                icon: 'file-text',
                color: '#2d6a4f',
                bg: 'rgba(45,106,79,0.08)',
                serial: postData.textSerial,
                schedule: schedule,
                type: 'template'
            });
        }
        if(mediaFile) {
            const isVideo = mediaFile.type.startsWith('video/');
            customVault.push({
                vaultTarget: isVideo ? 'videos' : 'graphics',
                name: mediaFile.name,
                size: Math.round(mediaFile.size / 1024) + ' KB',
                icon: isVideo ? 'video' : 'image',
                color: isVideo ? '#1e3a5f' : '#E4405F',
                bg: isVideo ? 'rgba(30,58,95,0.08)' : 'rgba(228,64,95,0.08)',
                serial: postData.mediaSerial,
                schedule: schedule,
                type: 'media'
            });
        }
        localStorage.setItem('customVault', JSON.stringify(customVault));

        showToast('تم حفظ المنشور بنجاح! تمت إضافته للتقويم والمخازن', 'success');
        closeAddPostModal();
        
        // Refresh local store view
        init();
    }


    function init() {
        renderStore();
    }

    
    function renderStore() {
        // Merge local storage items
        const customVault = JSON.parse(localStorage.getItem('customVault') || '[]');
        let mergedVaults = JSON.parse(JSON.stringify(vaultItems)); // deep copy
        
        customVault.forEach(item => {
            let targetVaultIndex = 3; // files by default
            if(item.vaultTarget === 'videos') targetVaultIndex = 0;
            if(item.vaultTarget === 'graphics') targetVaultIndex = 1;
            if(item.vaultTarget === 'templates') targetVaultIndex = 2;
            
            mergedVaults[targetVaultIndex].contents.unshift(item);
        });

        const grid = document.getElementById('storeGrid');
        grid.innerHTML = mergedVaults.map((item, i) => `

            <div class="vault-card animate-in delay-${i + 1}" style="--card-accent: ${item.accent}; --card-accent-bg: ${item.accentBg};">
                <div class="vault-header">
                    <div class="vault-icon" style="background: ${item.accentBg}; color: ${item.accent};">
                        <i data-lucide="${item.icon}"></i>
                    </div>
                    <div class="vault-title-group">
                        <div class="vault-title">${item.title}</div>
                        <div class="vault-meta">${item.contents.length} عنصر</div>
                    </div>
                </div>
                <div class="vault-items-grid">
                    ${item.contents.map(c => {
                        const actionIcon = c.type === 'template' ? 'copy' : 'download';
                        const actionFunc = c.type === 'template' ? 'copyVaultItem' : 'downloadVaultItem';
                        
                        return `
                        <div class="item-card">
                            <div class="item-preview" style="color: ${item.accent}">
                                <i data-lucide="${c.icon}"></i>
                            </div>
                            <div class="item-details">
                                <div class="item-name" title="${c.name}">${c.name}</div>
                                <div class="item-meta-row">
                                    <span>${c.serial}</span>
                                    <span>${c.size}</span>
                                </div>
                                ${c.schedule ? `<div class="item-schedule"><i data-lucide="calendar" style="width: 12px; height: 12px;"></i> ${c.schedule}</div>` : '<div style="height: 16px;"></div>'}
                            </div>
                            <div class="item-actions">
                                <button class="item-action-btn danger" onclick="showToast('تم حذف العنصر', 'success')" title="حذف">
                                    <i data-lucide="trash-2" style="width: 16px; height: 16px;"></i>
                                </button>
                                <button class="item-action-btn" onclick="showToast('جاري فتح التقويم...', 'info')" title="إعادة جدولة">
                                    <i data-lucide="calendar-clock" style="width: 16px; height: 16px;"></i>
                                </button>
                                <button class="item-action-btn" onclick="${actionFunc}('${c.name}')" title="${c.type === 'template' ? 'نسخ' : 'تنزيل'}">
                                    <i data-lucide="${actionIcon}" style="width: 16px; height: 16px;"></i>
                                </button>
                            </div>
                        </div>
                        `;
                    }).join('')}
                </div>
            </div>
        `).join('');
        
        if(window.lucide) lucide.createIcons();
    }

    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast';
        const colors = { info: '#1e3a5f', success: '#2d6a4f', error: '#c0392b' };
        const icons = { info: 'info', success: 'check-circle', error: 'alert-circle' };
        toast.style.setProperty('--toast-color', colors[type]);
        toast.innerHTML = `<i data-lucide="${icons[type]}" style="color: ${colors[type]}; width: 18px; height: 18px;"></i><span>${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
        if(window.lucide) lucide.createIcons();
    }

    function copyVaultItem(name) {
        navigator.clipboard.writeText(name);
        showToast('تم نسخ اسم الملف', 'success');
    }

    function downloadVaultItem(name) {
        showToast('جاري التحميل...', 'info');
        setTimeout(() => showToast('تم التنزيل بنجاح', 'success'), 1000);
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
<script src="lucide.min.js"></script>
</body>
</html>
